<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>پاکستان نامہ</title>
  <script>
    // GitHub Pages 404 trick:
    // Jab koi direct URL kholta hai jaise /news/2025-04-25-abc123
    // to ye page us URL ko hash mein convert karke index.html par bhej deta hai
    var seg = window.location.pathname; // e.g. /news/2025-04-25-abc123
    // /news ke baad jo bhi hai wo nikalo
    var after = seg.replace(/^\/news\/?/, '');
    if (after) {
      window.location.replace('https://pakistannama.github.io/news/#/article/' + after);
    } else {
      window.location.replace('https://pakistannama.github.io/news/');
    }
  </script>
</head>
<body></body>
</html>
