<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>پاکستان نامہ — تازہ ترین خبریں</title>
<meta name="description" content="پاکستان نامہ — پاکستان اور دنیا کی تازہ ترین خبروں کا قابل اعتماد ذریعہ">
<meta property="og:site_name" content="پاکستان نامہ">
<meta property="og:type" content="website">
<meta property="og:locale" content="ur_PK">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gd:#0a4a1a;--gm:#1a7a2a;--gl:#2db844;--gp:#e8f5e9;--gd2:#072e0f;
  --gold:#c9a84c;--goldl:#f5d78e;--goldd:#9a7a2c;
  --tp:#1a1a1a;--ts:#4a4a4a;--tm:#888;
  --bg:#f2f4f2;--card:#fff;--bdr:#e0e0e0;
  --sh:0 2px 12px rgba(0,0,0,0.08);--sh2:0 6px 24px rgba(0,0,0,0.13);
  --fu:'Noto Nastaliq Urdu',serif;
  --fi:'Noto Sans Arabic',sans-serif;
  --r:8px;--rl:14px;
}
html{scroll-behavior:smooth}
body{font-family:var(--fu);direction:rtl;background:var(--bg);color:var(--tp);font-size:16px;min-height:100vh;line-height:1.6}
.hide{display:none!important}
a{text-decoration:none;color:inherit}
button{cursor:pointer}

/* ===== HEADER ===== */
.hdr{background:linear-gradient(160deg,#041a08 0%,var(--gd) 45%,#0c3a16 100%);color:#fff;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;position:relative}
.logo-center{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px}
.logo-text{font-size:36px;font-weight:700;color:#fff;font-family:var(--fu);line-height:1.1;text-shadow:0 2px 8px rgba(0,0,0,0.3)}
.logo-underline{width:80px;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto}
.hdr-left{min-width:200px;display:flex;align-items:center}
.hdr-right{min-width:200px;display:flex;align-items:center;justify-content:flex-end}
.chief-editor{font-family:var(--fi);font-size:12px;color:var(--goldl);background:rgba(255,255,255,0.08);padding:6px 14px;border-radius:20px;border:1px solid rgba(201,168,76,0.3)}
.chief-editor strong{display:block;font-size:13px;color:#fff}
.date-bar{background:rgba(0,0,0,0.3);padding:5px 22px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:rgba(255,255,255,0.75);font-family:var(--fi);border-top:1px solid rgba(255,255,255,0.08)}
.date-bar .pst{direction:ltr;font-size:11px;color:rgba(255,255,255,0.5)}

/* ===== BREAKING NEWS ===== */
.brk{background:linear-gradient(90deg,#8b0000,#c0392b,#8b0000);color:#fff;display:flex;align-items:center;height:40px;overflow:hidden;border-bottom:2px solid #7f0000}
.brk-lbl{background:#5a0000;padding:0 20px;height:100%;display:flex;align-items:center;font-size:13px;font-weight:700;white-space:nowrap;font-family:var(--fi);gap:7px;min-width:120px;letter-spacing:.5px;flex-shrink:0;border-left:3px solid var(--gold)}
.brk-dot{width:8px;height:8px;background:#ff4444;border-radius:50%;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}
.brk-scroll{flex:1;overflow:hidden;height:100%;position:relative}
.brk-inner{display:flex;align-items:center;height:100%;white-space:nowrap;animation:tickerScroll 50s linear infinite}
.brk-inner:hover{animation-play-state:paused}
.brk-sep{color:var(--goldl);font-size:11px;padding:0 18px;opacity:.8}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.brk-item{padding:0 20px;font-size:14px;font-family:var(--fu)}

/* ===== NAV ===== */
.nav{background:var(--gm);position:sticky;top:0;z-index:200;box-shadow:0 3px 12px rgba(0,0,0,0.25)}
.nav-inner{display:flex;align-items:center;max-width:1240px;margin:0 auto;padding:0 12px;overflow-x:auto}
.nav-inner::-webkit-scrollbar{height:2px}.nav-inner::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.3)}
.nav-inner a{display:block;padding:11px 15px;color:rgba(255,255,255,.85);font-size:14px;font-family:var(--fu);border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;cursor:pointer}
.nav-inner a:hover,.nav-inner a.act{color:#fff;border-bottom-color:var(--gold);background:rgba(255,255,255,.1)}

/* ===== LAYOUT ===== */
.wrap{max-width:1240px;margin:0 auto;padding:20px 16px;width:100%}
.grid{display:grid;grid-template-columns:1fr 310px;gap:24px}

/* ===== SEARCH ===== */
.srch-bar{display:flex;gap:8px;margin-bottom:20px;background:var(--card);padding:12px 16px;border-radius:var(--rl);box-shadow:var(--sh)}
.srch-bar input{flex:1;padding:9px 14px;border:1.5px solid var(--bdr);border-radius:var(--r);font-family:var(--fu);font-size:15px;outline:none;transition:border-color .2s}
.srch-bar input:focus{border-color:var(--gm)}
.srch-bar button{background:var(--gm);color:#fff;border:none;padding:9px 20px;border-radius:var(--r);font-size:14px;font-family:var(--fi);transition:background .2s}
.srch-bar button:hover{background:var(--gd)}

/* ===== SECTION TITLES ===== */
.sec-ttl{font-size:19px;font-weight:700;color:var(--gd);border-right:4px solid var(--gl);padding-right:12px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;font-family:var(--fu)}
.sec-ttl a{font-size:12px;color:var(--gm);font-weight:400;font-family:var(--fi);cursor:pointer}
.sec-ttl a:hover{color:var(--gd)}

/* ===== NEWS CARDS ===== */
.feat-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;margin-bottom:28px}
.feat-side{display:flex;flex-direction:column;gap:14px}
.ncard{background:var(--card);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh);cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative}
.ncard:hover{transform:translateY(-4px);box-shadow:var(--sh2)}
.ncard-img{width:100%;overflow:hidden;background:var(--bg);display:flex;align-items:center;justify-content:center}
.ncard-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.ncard:hover .ncard-img img{transform:scale(1.04)}
.ncard-img .placeholder{font-size:44px;opacity:.25}
.ncard-body{padding:14px}
.cat-badge{display:inline-block;color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;margin-bottom:8px;font-family:var(--fi);font-weight:600;letter-spacing:.3px}
.ncard-ttl{font-family:var(--fu);font-weight:600;line-height:1.65;color:var(--tp);margin-bottom:6px}
.ncard-meta{font-size:11px;color:var(--tm);font-family:var(--fi);direction:ltr;text-align:right;display:flex;gap:10px;justify-content:flex-end;align-items:center;flex-wrap:wrap}
.views-badge{background:#f0f0f0;padding:1px 7px;border-radius:10px;font-size:10px}

/* ===== LIST ITEMS ===== */
.nlist{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
.nli{display:flex;gap:12px;background:var(--card);border-radius:var(--r);padding:12px;box-shadow:0 1px 5px rgba(0,0,0,.05);cursor:pointer;transition:box-shadow .2s,transform .2s}
.nli:hover{box-shadow:var(--sh);transform:translateX(-2px)}
.nli-img{width:100px;height:72px;border-radius:6px;flex-shrink:0;overflow:hidden;background:var(--bg);display:flex;align-items:center;justify-content:center}
.nli-img img{width:100%;height:100%;object-fit:cover}
.nli-body{flex:1;min-width:0}
.nli-ttl{font-family:var(--fu);font-size:15px;font-weight:600;line-height:1.55;margin-bottom:4px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.nli-meta{font-size:11px;color:var(--tm);font-family:var(--fi);direction:ltr;text-align:right}

/* ===== SIDEBAR ===== */
.sb{display:flex;flex-direction:column;gap:18px}
.sw{background:var(--card);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh)}
.sw-ttl{background:linear-gradient(135deg,var(--gd),var(--gm));color:#fff;padding:10px 15px;font-size:14px;font-family:var(--fu);font-weight:600;display:flex;align-items:center;gap:6px}
.sw-body{padding:13px}
.pop-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f5f5f5;cursor:pointer;align-items:flex-start;transition:background .15s}
.pop-item:last-child{border:none}
.pop-item:hover{background:#fafff9}
.pop-n{background:var(--gl);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:var(--fi);flex-shrink:0;font-weight:700;margin-top:2px}
.pop-tx{font-family:var(--fu);font-size:13px;line-height:1.55;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* ===== PRAYER TIMES WIDGET ===== */
.prayer-w{background:linear-gradient(145deg,#0d3b6e,#1a5c8a);color:#fff;border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh)}
.prayer-hdr{padding:12px 15px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:space-between}
.prayer-hdr h4{font-family:var(--fu);font-size:14px}
.prayer-city{font-family:var(--fi);font-size:11px;background:rgba(255,255,255,.15);padding:2px 10px;border-radius:10px}
.prayer-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:12px}
.pt-cell{background:rgba(255,255,255,.12);border-radius:8px;padding:8px 6px;text-align:center;transition:background .2s}
.pt-cell:hover{background:rgba(255,255,255,.2)}
.pt-cell.active{background:rgba(201,168,76,.35);border:1px solid rgba(201,168,76,.5)}
.pt-name{font-family:var(--fu);font-size:12px;opacity:.85}
.pt-time{font-family:var(--fi);font-size:14px;font-weight:700;margin-top:3px;direction:ltr}
.prayer-loading{text-align:center;padding:20px;font-family:var(--fi);font-size:12px;opacity:.7}

/* ===== GOLD & CURRENCY WIDGET ===== */
.rates-w{background:var(--card);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh)}
.rate-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5;font-family:var(--fi)}
.rate-item:last-child{border:none}
.rate-label{font-size:13px;color:var(--ts);display:flex;align-items:center;gap:6px}
.rate-flag{font-size:16px}
.rate-val{font-size:14px;font-weight:700;color:var(--gd);direction:ltr}
.rate-change{font-size:10px;padding:1px 6px;border-radius:8px}
.rate-up{background:#d4edda;color:#155724}
.rate-dn{background:#f8d7da;color:#721c24}
.gold-bar{background:linear-gradient(135deg,#9a7a2c,var(--gold));color:#fff;padding:12px 15px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;border-radius:8px}
.gold-bar .lbl{font-family:var(--fu);font-size:13px}
.gold-bar .val{font-family:var(--fi);font-size:16px;font-weight:700;direction:ltr}
.rates-update{font-family:var(--fi);font-size:10px;color:var(--tm);text-align:center;padding:4px 0;margin-top:4px}

/* ===== ARTICLE PAGE ===== */
.art-wrap{background:var(--card);border-radius:var(--rl);padding:24px;box-shadow:var(--sh);margin-bottom:20px}
.art-wrap h1{font-family:var(--fu);font-size:26px;font-weight:700;line-height:1.75;margin-bottom:14px;color:var(--tp)}
.art-hero{width:100%;border-radius:var(--r);margin-bottom:18px;overflow:hidden;max-height:400px;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.art-hero img{width:100%;max-height:400px;object-fit:cover}
.art-meta{display:flex;gap:14px;font-family:var(--fi);font-size:12px;color:var(--tm);margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--bdr);flex-wrap:wrap;align-items:center}
.art-body{font-family:var(--fu);font-size:18px;line-height:2.15;color:var(--tp)}
.art-body p{margin-bottom:16px}
.share-row{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--bdr);flex-wrap:wrap;align-items:center}
.sh-btn{padding:8px 20px;border-radius:22px;border:none;cursor:pointer;font-size:13px;color:#fff;font-weight:600;font-family:var(--fi);transition:opacity .2s}
.sh-btn:hover{opacity:.85}
.back-btn{background:var(--gd);color:#fff;border:none;padding:8px 18px;border-radius:var(--r);font-family:var(--fi);font-size:13px;margin-bottom:16px;display:inline-flex;align-items:center;gap:6px;transition:background .2s}
.back-btn:hover{background:var(--gm)}

/* ===== CATEGORY PAGE ===== */
.cat-hdr{color:#fff;padding:20px;border-radius:var(--rl);margin-bottom:20px;display:flex;align-items:center;gap:16px}
.cat-hdr .cat-icon{font-size:32px}
.cat-hdr h2{font-family:var(--fu);font-size:24px;margin-bottom:3px}
.cat-hdr p{font-family:var(--fi);font-size:13px;opacity:.8}

/* ===== PAGINATION ===== */
.pg{display:flex;justify-content:center;gap:8px;margin:20px 0}
.pg-btn{padding:7px 16px;border:1.5px solid var(--bdr);border-radius:var(--r);cursor:pointer;background:#fff;font-size:13px;font-family:var(--fi);transition:all .2s}
.pg-btn.on,.pg-btn:hover{background:var(--gm);color:#fff;border-color:var(--gm)}

/* ===== FOOTER ===== */
.ftr{background:linear-gradient(160deg,#041408,var(--gd));color:rgba(255,255,255,.8);padding:32px 20px 16px;margin-top:auto}
.ftr-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:28px;max-width:1240px;margin:0 auto 22px}
.ftr-col h4{color:var(--goldl);font-family:var(--fu);font-size:15px;margin-bottom:12px;font-weight:600;display:flex;align-items:center;gap:8px}
.ftr-col h4::after{content:'';flex:1;height:1px;background:rgba(201,168,76,.25)}
.ftr-col p{font-family:var(--fu);font-size:13px;color:rgba(255,255,255,.65);line-height:2}
.ftr-col ul{list-style:none}
.ftr-col ul li{margin-bottom:6px}
.ftr-col ul li a{color:rgba(255,255,255,.65);font-size:14px;font-family:var(--fu);cursor:pointer;transition:color .2s;display:inline-flex;align-items:center;gap:6px}
.ftr-col ul li a:hover{color:var(--goldl)}
.ftr-col ul li a::before{content:'›';color:var(--gold)}
.social-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.soc-btn{padding:6px 16px;border-radius:20px;font-size:12px;font-family:var(--fi);border:none;cursor:pointer;color:#fff;font-weight:600;transition:opacity .2s}
.soc-btn:hover{opacity:.85}
.ftr-btm{text-align:center;border-top:1px solid rgba(255,255,255,.1);padding-top:16px;font-size:12px;color:rgba(255,255,255,.4);direction:ltr;font-family:var(--fi)}
.ftr-addr{margin-top:10px;font-family:var(--fi);font-size:12px;color:rgba(255,255,255,.5);line-height:1.9}

/* ===== STATIC PAGES ===== */
.page-wrap{background:var(--card);border-radius:var(--rl);padding:28px;box-shadow:var(--sh);max-width:800px}
.page-wrap h1{font-family:var(--fu);font-size:26px;color:var(--gd);margin-bottom:6px}
.page-divider{height:3px;background:linear-gradient(90deg,var(--gold),transparent);border:none;margin:14px 0 20px}
.page-wrap p{font-family:var(--fu);font-size:16px;line-height:2.1;color:var(--ts);margin-bottom:14px}
.page-wrap h3{font-family:var(--fu);font-size:18px;color:var(--gd);margin:20px 0 10px;border-right:3px solid var(--gold);padding-right:10px}
.contact-form{background:#f9f9f9;border-radius:var(--r);padding:20px;margin-top:16px}
.cf-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.cf-field{display:flex;flex-direction:column;gap:5px}
.cf-field label{font-family:var(--fi);font-size:12px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.5px}
.cf-field input,.cf-field textarea,.cf-field select{padding:10px 13px;border:1.5px solid var(--bdr);border-radius:var(--r);font-family:var(--fu);font-size:14px;outline:none;transition:border-color .2s;width:100%}
.cf-field input:focus,.cf-field textarea:focus{border-color:var(--gm)}
.cf-submit{background:var(--gm);color:#fff;border:none;padding:11px 28px;border-radius:var(--r);font-family:var(--fu);font-size:15px;cursor:pointer;transition:background .2s;margin-top:4px}
.cf-submit:hover{background:var(--gd)}

/* ===== ADMIN PANEL ===== */
.adm-ov{position:fixed;inset:0;background:#eef0ee;z-index:1000;display:flex;flex-direction:column;direction:ltr;font-family:var(--fi);overflow:hidden}
.adm-hdr{background:var(--gd);color:#fff;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.adm-hdr h2{font-size:17px;font-weight:600;font-family:var(--fu);direction:rtl;display:flex;align-items:center;gap:10px}
.adm-body{display:flex;flex:1;overflow:hidden}
.adm-sb{width:220px;background:#fff;border-left:1px solid var(--bdr);overflow-y:auto;flex-shrink:0}
.adm-menu{list-style:none;padding:10px 0}
.adm-menu li a{display:flex;align-items:center;gap:10px;padding:11px 18px;color:var(--ts);font-size:13px;cursor:pointer;transition:all .15s;text-decoration:none}
.adm-menu li a:hover,.adm-menu li a.on{background:var(--gp);color:var(--gd);font-weight:600;border-left:3px solid var(--gm)}
.adm-main{flex:1;overflow-y:auto;padding:24px}
.adm-ttl{font-size:20px;font-weight:700;color:var(--gd);margin-bottom:20px;display:flex;align-items:center;gap:10px;justify-content:space-between}
.stats-g{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:26px}
.sc{background:#fff;border-radius:var(--rl);padding:18px;box-shadow:var(--sh);border-top:4px solid var(--gl);transition:transform .2s}
.sc:hover{transform:translateY(-2px)}
.sc .n{font-size:32px;font-weight:700;color:var(--gd);line-height:1}
.sc .l{font-size:12px;color:var(--tm);margin-top:4px}
.dtbl{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh)}
.dtbl th{background:var(--gd);color:#fff;padding:11px 14px;font-size:12px;text-align:left;white-space:nowrap;letter-spacing:.3px}
.dtbl td{padding:11px 14px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
.dtbl tr:last-child td{border:none}
.dtbl tr:hover td{background:#f8fff8}
.badge{display:inline-block;padding:2px 9px;border-radius:12px;font-size:11px;font-weight:600}
.bg{background:#d4edda;color:#155724}
.bb{background:#d0e8ff;color:#0c4a8c}
.btn-s{padding:5px 12px;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:600;transition:opacity .2s}
.btn-s:hover{opacity:.8}
.be{background:#fff3cd;color:#856404}
.bd{background:#f8d7da;color:#721c24}
.btn-p{background:var(--gm);color:#fff;padding:9px 20px;border-radius:var(--r);border:none;cursor:pointer;font-size:13px;font-weight:600;transition:background .2s}
.btn-p:hover{background:var(--gd)}
.btn-sec{background:#6c757d;color:#fff;padding:9px 20px;border-radius:var(--r);border:none;cursor:pointer;font-size:13px;transition:background .2s}
.btn-sec:hover{background:#555}
.fp{background:#fff;border-radius:var(--rl);padding:24px;box-shadow:var(--sh);max-width:740px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--ts);margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.fc{width:100%;padding:9px 13px;border:1.5px solid var(--bdr);border-radius:var(--r);font-size:13px;outline:none;font-family:inherit;transition:border-color .2s}
.fc:focus{border-color:var(--gm)}
.fc[dir=rtl]{font-family:var(--fu);font-size:15px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:15px}

// ======================================================
// PERSISTENCE
// ======================================================
function loadDB(){
  try{
    const saved=localStorage.getItem(STORAGE_KEY);
    if(saved){
      const parsed=JSON.parse(saved);
      // Merge to ensure new keys are present
      return {...DEFAULT_DB,...parsed,settings:{...DEFAULT_DB.settings,...parsed.settings},rates:{...DEFAULT_DB.rates,...parsed.rates},prayer:{...DEFAULT_DB.prayer,...parsed.prayer}};
    }
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_DB));
}
function saveDB(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(DB))}catch(e){}
}
function loadPass(){return 'PAKistan11$';}
function savePass(p){}

let DB=loadDB();
let PASS=loadPass();

// STATE
// ======================================================

  page:'home',
  adm:false,admPg:'dashboard',admIn:false,
  editN:null,editC:null,editA:null,
  viewN:null,catF:null,srch:'',staticPg:null,

// ======================================================
// UTILS
// ======================================================
function toast(m,dur=3000){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur);
}
function getCat(id){return DB.categories.find(c=>c.id==id)||{name:'',color:'#888',icon:'📰',slug:''}}
function getAuth(id){return DB.authors.find(a=>a.id==id)||{name:'نامعلوم'}}
function fmtDate(d){try{return new Date(d).toLocaleDateString('ur-PK',{year:'numeric',month:'long',day:'numeric'})}catch{return d}}
function todayUrdu(){return new Date().toLocaleDateString('ur-PK',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
function slugify(t){return t.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9\u0600-\u06FF-]/g,'').slice(0,60)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escUrl(s){return(s||'').replace(/"/g,'%22').replace(/</g,'%3C').replace(/>/g,'%3E')}

// URL routing
function getSlug(){return location.hash.replace('#/','').replace('news/','').trim()}
function pushState(path){location.hash='#/'+path}

// ======================================================
// PRAYER TIMES (AlAdhan API)
// ======================================================
async function fetchPrayerTimes(){
  const today=new Date().toDateString();
  if(DB.prayer.lastUpdated===today&&DB.prayer.fajr!=='--:--')return;
  try{
    const r=await fetch('https://api.aladhan.com/v1/timingsByCity?city=Lahore&country=Pakistan&method=1');
    const d=await r.json();
    if(d.code===200){
      const t=d.data.timings;
      DB.prayer={fajr:t.Fajr,zuhr:t.Dhuhr,asr:t.Asr,maghrib:t.Maghrib,isha:t.Isha,city:'لاہور',lastUpdated:today};
      saveDB();
      // refresh prayer widget only
      const pw=document.getElementById('prayer-widget');
      if(pw)pw.innerHTML=buildPrayerInner();
    }
  }catch(e){}
}

function getCurrentPrayer(){
  const now=new Date();
  const hm=(s)=>{const[h,m]=s.split(':').map(Number);return h*60+m};
  const cur=now.getHours()*60+now.getMinutes();
  const prayers=[
    {name:'فجر',time:DB.prayer.fajr},
    {name:'ظہر',time:DB.prayer.zuhr},
    {name:'عصر',time:DB.prayer.asr},
    {name:'مغرب',time:DB.prayer.maghrib},
    {name:'عشاء',time:DB.prayer.isha}
  ];
  let active=4;
  for(let i=0;i<prayers.length;i++){
    if(cur>=hm(prayers[i].time)&&(i===prayers.length-1||cur<hm(prayers[i+1].time))){active=i;break;}
  }
  return active;
}

function buildPrayerInner(){
  const prayers=[
    {key:'fajr',name:'فجر',time:DB.prayer.fajr},
    {key:'zuhr',name:'ظہر',time:DB.prayer.zuhr},
    {key:'asr',name:'عصر',time:DB.prayer.asr},
    {key:'maghrib',name:'مغرب',time:DB.prayer.maghrib},
    {key:'isha',name:'عشاء',time:DB.prayer.isha}
  ];
  const activeIdx=getCurrentPrayer();
  return prayers.map((p,i)=>`<div class="pt-cell ${i===activeIdx?'active':''}"><div class="pt-name">${p.name}</div><div class="pt-time">${p.time}</div></div>`).join('');
}

// ======================================================
// RENDER ENGINE
// ======================================================
function render(){
  const app=document.getElementById('app');
  if(S.adm&&!S.admIn){app.innerHTML=rLogin();return}
  if(S.adm){app.innerHTML=rAdmin();return}
  app.innerHTML=rSite();
  // fetch prayers asynchronously after render
  fetchPrayerTimes();
}

// SITE SHELL
// ======================================================

${rHdr()}${rBrk()}${rNav()}
<div class="wrap">${rSrch()}${content}</div>

${cats4.map(cat=>{
  const cn=DB.news.filter(n=>n.catId===cat.id).slice(0,3);
  return cn.length?`<div style="margin-bottom:28px">
<div class="sec-ttl" style="border-color:${cat.color}">${cat.icon} ${cat.name} <a onclick="setCAT(${cat.id})">مزید ←</a></div>

function rArticle(){
  const n=DB.news.find(x=>x.id===S.viewN);
  if(!n)return`<p style="text-align:center;padding:40px;font-family:var(--fu)">خبر نہیں ملی</p>`;
  n.views++;saveDB();
  const cat=getCat(n.catId);
  const related=DB.news.filter(x=>x.catId===n.catId&&x.id!==n.id).slice(0,3);
  const shareLink=buildShareLink(n);
  const articleUrl=encodeURIComponent(shareLink);
  const articleTitle=encodeURIComponent(n.title);
  const fbShare=`https://www.facebook.com/sharer/sharer.php?u=${articleUrl}`;
  const waShare=`https://api.whatsapp.com/send?text=${articleTitle}%20${articleUrl}`;
  const twShare=`https://twitter.com/intent/tweet?text=${articleTitle}&url=${articleUrl}`;

  // Format body with paragraphs
  const bodyHtml=n.body.split('\n').filter(p=>p.trim()).map(p=>`<p>${esc(p)}</p>`).join('');

  return`<div class="grid">
<div>
<button class="back-btn" onclick="S.viewN=null;render()">← واپس</button>
<div class="art-wrap">
<span class="cat-badge" style="background:${cat.color}">${cat.icon} ${cat.name}</span>
<h1>${esc(n.title)}</h1>
<div class="art-meta">
<span style="font-family:var(--fu)">✍ ${getAuth(n.author).name}</span>
<span>📅 ${fmtDate(n.date)}</span>
<span>👁 ${n.views.toLocaleString()} مناظر</span>
${n.tags?n.tags.split(',').map(t=>`<span class="badge bg">#${t.trim()}</span>`).join(''):''}
</div>
<div class="art-hero" style="background:linear-gradient(135deg,${cat.color}20,${cat.color}40);height:300px">
${n.image?`<img src="${escUrl(n.image)}" alt="${esc(n.title)}">`:`<span style="font-size:72px;opacity:.2">📰</span>`}
</div>
<div class="art-body">${bodyHtml}</div>
<div class="share-row">
<span style="font-family:var(--fu);font-size:14px;color:var(--ts)">شیئر کریں:</span>
<button class="sh-btn" style="background:#1877f2" onclick="window.open('${fbShare}','_blank','width=600,height=400')">📘 Facebook</button>
<button class="sh-btn" style="background:#25d366" onclick="window.open('${waShare}','_blank')">📱 WhatsApp</button>
<button class="sh-btn" style="background:#1da1f2" onclick="window.open('${twShare}','_blank','width=600,height=400')">🐦 Twitter/X</button>
<button class="sh-btn" style="background:var(--gd)" onclick="navigator.clipboard&&navigator.clipboard.writeText(buildShareLink(DB.news.find(x=>x.id===S.viewN))).then(()=>toast('لنک کاپی ہو گیا ✓'))">🔗 لنک کاپی</button>
</div>
</div>
${related.length?`<div style="margin-top:22px">
<div class="sec-ttl" style="border-color:${cat.color}">متعلقہ خبریں</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">${related.map(x=>rCard(x,'small')).join('')}</div>
</div>`:''}
</div>
<div class="sb">${rSidebar([...DB.news].sort((a,b)=>b.views-a.views).slice(0,5))}</div>
</div>`;
}

window.doSrch=()=>{
  const v=document.getElementById('si')?.value?.trim()||'';
  if(!v)return;
  S.srch=v;S.catF=null;S.viewN=null;S.staticPg=null;
  const q=v.toLowerCase();
  const res=DB.news.filter(n=>n.title.includes(v)||n.body.includes(v)||n.tags.toLowerCase().includes(q));
  const trending=[...DB.news].sort((a,b)=>b.views-a.views).slice(0,5);
  const app=document.getElementById('app');
  const inner=document.querySelector('.grid');
  if(inner){
    inner.innerHTML=`<div>
<div class="sec-ttl">🔍 نتائج: "${esc(v)}" <span style="font-weight:400;font-size:13px;color:var(--tm)">(${res.length} خبریں)</span></div>
<div class="nlist">${res.length?res.map(n=>rLI(n)).join(''):`<div style="text-align:center;padding:50px;color:var(--tm);font-family:var(--fu);font-size:16px">🔍 کوئی نتیجہ نہیں ملا</div>`}</div>
</div>
<div class="sb">${rSidebar(trending)}</div>`;
  }
}

window.autoSlug=()=>{
  const t=document.getElementById('ft')?.value||'';
  const sl=document.getElementById('fsl');
  if(sl&&!sl.dataset.manual)sl.value=slugify(t);
}
document.addEventListener('click',e=>{if(e.target.id==='fsl')e.target.dataset.manual='1'});

window.saveN=(id)=>{
  const t=document.getElementById('ft')?.value?.trim()||'';
  const b=document.getElementById('fb')?.value?.trim()||'';
  if(!t||!b){toast('عنوان اور مواد ضروری ہیں');return}
  const sl=document.getElementById('fsl')?.value?.trim()||slugify(t);
  const obj={
    id:id||S.nid++,title:t,body:b,
    catId:parseInt(document.getElementById('fc')?.value||1),
    author:parseInt(document.getElementById('fa')?.value||1),
    date:document.getElementById('fd')?.value||new Date().toISOString().split('T')[0],
    featured:document.getElementById('ff')?.checked||false,
    image:document.getElementById('fi')?.value?.trim()||'',
    tags:document.getElementById('fk')?.value||'',
    slug:sl,
    views:id?(DB.news.find(n=>n.id===id)||{}).views||0:0,
    metaTitle:document.getElementById('fmt')?.value||'',
    metaDesc:document.getElementById('fmd')?.value||'',
  };
  if(id){const i=DB.news.findIndex(n=>n.id===id);if(i>=0)DB.news[i]=obj}
  else DB.news.unshift(obj);
  saveDB();S.editN=null;S.admPg='news';
  toast(id?'خبر اپ ڈیٹ ہو گئی ✓':'خبر شائع ہو گئی ✓');render()
}
window.delN=(id)=>{if(confirm('یہ خبر مستقل حذف کریں؟')){DB.news=DB.news.filter(n=>n.id!==id);saveDB();toast('خبر حذف ہو گئی');render()}}

window.saveCat=()=>{
  const name=document.getElementById('cn')?.value?.trim()||'';
  const slug=document.getElementById('cs')?.value?.trim()||'';
  const color=document.getElementById('cc')?.value||'#2db844';
  const icon=document.getElementById('ci')?.value||'📰';
  if(!name||!slug){toast('نام اور slug ضروری ہیں');return}
  if(S.editC){
    const i=DB.categories.findIndex(c=>c.id===S.editC.id);
    if(i>=0)DB.categories[i]={...DB.categories[i],name,slug,color,icon}
  }else{DB.categories.push({id:Date.now(),name,slug,color,icon})}
  saveDB();S.editC=null;toast('زمرہ محفوظ ✓');render()
}

}

// ======================================================
// CLOUDINARY IMAGE UPLOAD
// ======================================================
const CLD_CLOUD = 'dq2fbsi1s';
const CLD_PRESET = 'pakistan_nama';

window.uploadToCloudinary = async function(input){
  const file = input.files[0];
  if(!file) return;
  const status = document.getElementById('cld-status');
  const preview = document.getElementById('cld-preview');
  const fiInput = document.getElementById('fi');
  if(status) status.textContent = '⏳ تصویر upload ہو رہی ہے...';
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLD_PRESET);
  try{
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLD_CLOUD}/image/upload`, {method:'POST', body:fd});
    const data = await res.json();
    if(data.secure_url){
      fiInput.value = data.secure_url;
      if(preview){ preview.style.display='block'; preview.innerHTML=`<img src="${data.secure_url}" style="max-height:120px;border-radius:6px;border:1px solid #ddd">`; }
      if(status){ status.style.color='#2db844'; status.textContent='✅ تصویر کامیابی سے upload ہو گئی!'; }
      toast('تصویر upload ہو گئی ✓');
    } else {
      if(status){ status.style.color='#c0392b'; status.textContent='❌ Error: '+(data.error?.message||'Upload ناکام'); }
    }
  } catch(e){
    if(status){ status.style.color='#c0392b'; status.textContent='❌ Network error — دوبارہ کوشش کریں'; }
  }
  input.value='';
};

// ======================================================
// SHAREABLE LINK HELPERS
// ======================================================
function buildShareLink(n){
  if(!n) return location.href.split('#')[0];
  const base=location.href.split('#')[0].split('?')[0];
  // Simple clean link — only slug, no base64 data
  return base+'#/news/'+n.slug;
}

// ======================================================
// HASH ROUTING — enables shareable links
// ======================================================
function handleRoute(){
  const hash=location.hash;

  if(!hash||hash==='#/'||hash==='#'){S.viewN=null;S.catF=null;S.staticPg=null;return}

  // /news/slug
  const newsMatch=hash.match(/^#\/news\/([^?&#]+)/);
  if(newsMatch){
    const slug=newsMatch[1];
    const n=DB.news.find(x=>x.slug===slug);
    if(n){S.viewN=n.id;S.catF=null;S.staticPg=null;}
    return;
  }
  // /cat/slug
  const catMatch=hash.match(/^#\/cat\/(.+)$/);
  if(catMatch){
    const c=DB.categories.find(x=>x.slug===catMatch[1]);
    if(c){S.catF=c.id;S.viewN=null;S.staticPg=null;}
    return;
  }
  // /page/name
  const pgMatch=hash.match(/^#\/page\/(.+)$/);
  if(pgMatch){S.staticPg=pgMatch[1];S.viewN=null;S.catF=null;}
}

window.addEventListener('hashchange',()=>{handleRoute();render();window.scrollTo(0,0)});
handleRoute();

// ======================================================
// BOOT
// ======================================================
render();
